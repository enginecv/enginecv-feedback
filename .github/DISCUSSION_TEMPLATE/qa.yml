title: "[Q]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Use this for "how do I…", "what does this setting do", or "is this expected" questions.

        If you think you've found a bug, open an Issue with the **Bug report** template instead.

  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: What you tried
      description: What did you try, look at, or read before asking? Helps avoid pointing at the same docs twice.

  - type: input
    id: version
    attributes:
      label: App version (optional)
      description: Visible in the footer of the app.
      placeholder: e.g. 0.1.0
